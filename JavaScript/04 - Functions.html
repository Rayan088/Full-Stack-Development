<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions</title>
  </head>
  <body>
    <script>
      // Functions allow you to reuse code
      function function1() {
        console.log("Hello");
      }

      function1(); // Calling the function

      // Parameters allow you to insert values into a function, they can have default parameters
      function calculateTax(cost, taxPercent = 0.1) {
        console.log(cost * taxPercent);
      }

      calculateTax(2000, 0.5);
      calculateTax(5000);
    </script>
  </body>
</html>
