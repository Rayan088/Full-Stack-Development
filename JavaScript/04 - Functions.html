<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <!-- Buttons for rpc game -->
    <button onclick="playGame('rock')">Rock</button>

    <button onclick="playGame('paper')">Paper</button>

    <button onclick="playGame('scissors')">Scissors</button>

    <script>
      // Function for deciding outcome
      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = "";
        if (playerMove === "scissors") {
          if (computerMove === "rock") {
            result = "You lose";
          } else if (computerMove === "paper") {
            result = "You win";
          } else if (computerMove === "scissors") {
            result = "Tie";
          }
        } else if (playerMove === "paper") {
          if (computerMove === "rock") {
            result = "You win";
          } else if (computerMove === "paper") {
            result = "Tie";
          } else if (computerMove === "scissors") {
            result = "You lose";
          }
        } else if (playerMove === "rock") {
          if (computerMove === "rock") {
            result = "Tie";
          } else if (computerMove === "paper") {
            result = "You lose";
          } else if (computerMove === "scissors") {
            result = "You win";
          }
        }

        alert(
          `You picked ${playerMove}. Computer picked ${computerMove}. ${result}`,
        );
      }

      // Function for picking the computer move
      function pickComputerMove() {
        const randomNumber = Math.random(); // Generates random number

        let computerMove = "";

        if (randomNumber >= 0 && randomNumber <= 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber > 1 / 3 && randomNumber <= 2 / 3) {
          computerMove = "paper";
        } else {
          computerMove = "scissors";
        }

        return computerMove; // Returns a value from a function or undefined if empty
      }

      // Functions allow you to reuse code
      function function1() {
        console.log("Hello");
      }

      function1(); // Calling the function

      // Parameters allow you to insert values into a function, they can have default parameters
      function calculateTax(cost, taxPercent = 0.1) {
        console.log(cost * taxPercent);
      }

      calculateTax(2000, 0.5);
      calculateTax(5000);
    </script>
  </body>
</html>
