<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Objects</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <!-- Buttons for rpc game -->
    <button onclick="playGame('rock')">Rock</button>

    <button onclick="playGame('paper')">Paper</button>

    <button onclick="playGame('scissors')">Scissors</button>

    <!-- Placeholders later filled with text using DOM-->
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>

    <button
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
      "
    >
      Reset Score
    </button>

    <script>
      // Loads score saved into local storage
      let score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      updateScoreElement();

      // Function for deciding outcome
      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = "";
        if (playerMove === "scissors") {
          if (computerMove === "rock") {
            result = "You lose";
          } else if (computerMove === "paper") {
            result = "You win";
          } else if (computerMove === "scissors") {
            result = "Tie";
          }
        } else if (playerMove === "paper") {
          if (computerMove === "rock") {
            result = "You win";
          } else if (computerMove === "paper") {
            result = "Tie";
          } else if (computerMove === "scissors") {
            result = "You lose";
          }
        } else if (playerMove === "rock") {
          if (computerMove === "rock") {
            result = "Tie";
          } else if (computerMove === "paper") {
            result = "You lose";
          } else if (computerMove === "scissors") {
            result = "You win";
          }
        }

        //Increment score by 1
        if (result === "You win") {
          score.wins++;
        } else if (result === "You lose") {
          score.losses++;
        } else if (result === "Tie") {
          score.ties++;
        }

        // Local storage saves score into storage, more permanent than variables
        localStorage.setItem("score", JSON.stringify(score)); // Name, Item. Online supports strings

        updateScoreElement();

        // Dynamically updates HTML
        document.querySelector(".js-result").innerHTML = result;

        document.querySelector(".js-moves").innerHTML =
          `You ${playerMove} - ${computerMove} Computer`;
      }

      // Function that updates score
      function updateScoreElement() {
        document.querySelector(".js-score").innerHTML =
          `Wins: ${score.wins}, Losses: ${score.losses}, Ties ${score.ties}`;
      }

      // Function for picking the computer move
      function pickComputerMove() {
        const randomNumber = Math.random(); // Generates random number between 0 and 1

        let computerMove = "";

        if (randomNumber >= 0 && randomNumber <= 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber > 1 / 3 && randomNumber <= 2 / 3) {
          computerMove = "paper";
        } else {
          computerMove = "scissors";
        }

        return computerMove; // Returns a value from a function or undefined if empty
      }

      // Objects group multiple values together
      // Structured as Property-Value pairs (price, 1000)
      const product = {
        name: "socks",
        price: 1000,
      };
      console.log(product);
      console.log(product.name); // Accesses value associated with name
      console.log(product.price); // Accesses value associated with price

      product.name = "cotton socks"; // Can change value

      product.new_Property = true; // Can add properties

      delete product.new_Property; // Can delete properties

      const product2 = {
        name: "shirt",
        "delivery-time": "1 day",
        rating: {
          // Nested object
          stars: 4.5,
          count: 87,
        },
        fun: function function1() {
          // Function inside an object
          console.log("Function inside an object");
        },
      };
      console.log(product2.name);
      console.log(product2["name"]); // Bracket notation to access valuse
      console.log(product2["delivery-time"]); // Used when built in notation is used such as minus (-)

      console.log(product2.rating.count); // Accessing nested objects
      product2.fun(); // Accessing function inside a nested object

      console.log(typeof console); // console is also an object

      // JSON (JavaScript Object Notation)
      // Syntax similar to object with less features
      // Universally used by many languages
      // Build in JSON Object helps convert JS object to JSON

      console.log(JSON.stringify(product2)); // Converts JS function to JSON. NOTE: Function is not included

      const jsonString = JSON.stringify(product2);
      console.log(JSON.parse(jsonString)); // Converts JSON to JS function

      // Autoboxing, strings are auto wraped into object to allow object like features
      console.log("hello".length); // counts no of letters
      console.log("hello".toUpperCase); // converts to uppercase

      // Objects are references, each object has a memory location which points to the object
      const object1 = {
        message: "hello",
      };

      // Copy by reference points memory location to object2, same reference in computer memory
      const object2 = object1;

      // Reaches into reference and changing object is it pointing to
      object1.message = "GoodBye";
      console.log(object1);
      console.log(object2); // Also changed message

      const object3 = {
        message: "GoodBye",
      };

      console.log(object3 === object1); // False because different reference due to different objects
      console.log(object2 === object1); // True because both objects have the same reference

      const object4 = {
        message: "Goodbye",
        price: 999,
      };

      // Destructuring: Takes message and price property out of object 4 and saves as message and price
      const { message, price } = object4;
      console.log(message);
      console.log(price);

      // Shorthand property and shorthand method
      const object5 = {
        message: message, // Same as code below
        message, // Shorthand property: if name and variable are the same you can type out variable once

        method: function function2() {
          console.log("method");
        },
        // Shorthand method: Code above is same as code below
        method() {
          console.log("method");
        },
      };
      console.log(object5);
      object5.method();
    </script>
  </body>
</html>
