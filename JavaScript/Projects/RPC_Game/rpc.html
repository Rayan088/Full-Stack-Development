<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="rpc.css" />
  </head>
  <body>
    <p class="title-text">Rock Paper Scissors</p>
    <!-- Buttons for rpc game -->
    <button onclick="playGame('rock')" class="move-button">
      <img src="../../Images/rock-emoji.png" class="move-icon" alt="Rock" />
    </button>

    <button onclick="playGame('paper')" class="move-button">
      <img src="../../Images/paper-emoji.png" class="move-icon" alt="Paper" />
    </button>

    <button onclick="playGame('scissors')" class="move-button">
      <img
        src="../../Images/scissors-emoji.png"
        class="move-icon"
        alt="Scissors"
      />
    </button>

    <!-- Placeholders later filled with text using DOM-->
    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
      "
      class="reset-button"
    >
      Reset Score
    </button>

    <button class="auto-play-button" onclick="autoPlay()">Auto Play</button>

    <script src="rpc.js"></script>
  </body>
</html>
