<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="rpc.css" />
  </head>
  <body>
    <p class="title-text">Rock Paper Scissors</p>

    <!-- Buttons for rpc game -->
    <button class="move-button js-rock-button">
      <img src="../../Images/rock-emoji.png" class="move-icon" alt="Rock" />
    </button>

    <button class="move-button js-paper-button">
      <img src="../../Images/paper-emoji.png" class="move-icon" alt="Paper" />
    </button>

    <button class="move-button js-scissors-button">
      <img
        src="../../Images/scissors-emoji.png"
        class="move-icon"
        alt="Scissors"
      />
    </button>

    <!-- Placeholders later filled with text using DOM-->
    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button class="reset-button js-reset-button">Reset Score</button>

    <button class="auto-play-button js-autoplay-button">Auto Play</button>

    <script src="rpc.js"></script>
  </body>
</html>
