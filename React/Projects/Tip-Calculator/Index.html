<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="Index.css" />
  </head>

  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function Calculations({ bill, people }) {
        const billNum = Number(bill);
        const peopleNum = Number(people);

        const tipAmount = billNum * 0.2;
        const total = billNum + tipAmount;
        const perPerson = peopleNum > 0 ? total / peopleNum : total;

        return (
          <div className="calculations">
            <div className="row">
              <span className="total-bill">Total Bill</span>
              <span className="num-total-bill">£{total.toFixed(2)}</span>
            </div>

            <div className="row">
              <span className="tip-amount">Tip Amount (20%)</span>
              <span className="num-tip-amount">£{tipAmount.toFixed(2)}</span>
            </div>

            <div className="row">
              <span className="per-person">Per Person</span>
              <span className="num-per-person">£{perPerson.toFixed(2)}</span>
            </div>
          </div>
        );
      }

      function InputFields({ bill, setBill, people, setPeople }) {
        return (
          <div>
            <div>
              <p className="bill-text">Bill Total</p>
              <input
                className="bill-input"
                value={bill}
                onChange={(e) => setBill(e.target.value)}
                placeholder="Enter bill amount"
                size="40"
              />
            </div>
            <div>
              <p className="people-text">Number of People</p>
              <input
                className="people-input"
                value={people}
                onChange={(e) => setPeople(e.target.value)}
                placeholder="Enter number of people"
                size="40"
              />
            </div>
          </div>
        );
      }

      function App() {
        const [bill, setBill] = React.useState("");
        const [people, setPeople] = React.useState("");

        return (
          <div className="container">
            <div>
              <h1 class="title">Tip Calculator</h1>
              <p class="description">
                Enter your bill and number of people to calculate the tip
              </p>

              <InputFields
                bill={bill}
                setBill={setBill}
                people={people}
                setPeople={setPeople}
              />

              <Calculations bill={bill} people={people} />
            </div>
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
